version: '3.8'

services:
  # ─── Supabase (Postgres + Auth + API) ──────────────────
  supabase-db:
    image: supabase/postgres:15.1.1.61
    container_name: guardian-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guardian-dev-password}
      POSTGRES_DB: guardian
    volumes:
      - guardian-db-data:/var/lib/postgresql/data
      - ../packages/supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  supabase-studio:
    image: supabase/studio:20240101
    container_name: guardian-studio
    ports:
      - '54323:3000'
    environment:
      STUDIO_PG_META_URL: http://supabase-meta:8080
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_REST_URL: http://supabase-kong:8000/rest/v1/
    depends_on:
      supabase-db:
        condition: service_healthy

  # ─── API Server ────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    container_name: guardian-api
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      API_PORT: 3001
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      GITLAB_WEBHOOK_SECRET: ${GITLAB_WEBHOOK_SECRET}
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped

  # ─── Web Dashboard ────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: web
    container_name: guardian-web
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://api:3001
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    depends_on:
      - api
    restart: unless-stopped

  # ─── Nginx Reverse Proxy ──────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: guardian-proxy
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  guardian-db-data:
